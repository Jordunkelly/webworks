  <style>
    :root {
      --bg: #0d1117; --sf: #161b22; --in: #010409; --bd: #30363d; 
      --sn: #e6edf3; --ic: #8b949e; --dm: #6e7681; --gd: #21262d; 
      --ru: #d2a8ff; --pn: #3fb950; --pb: rgba(63, 185, 80, 0.1); 
      --bl: #f85149; --fj: #58a6ff; 
      --hd: 'Press Start 2P', monospace; 
      --mono: 'JetBrains Mono', 'Consolas', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--sn); font-family: var(--sans); font-size: 14px; line-height: 1.6; }
    
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }
    ::selection { background: var(--ru); color: var(--bg); }
    
    .card { background: var(--sf); padding: 20px; margin-bottom: 16px; border: 1px solid var(--bd); border-radius: 8px; }
    .card.gold { border-color: var(--ru); box-shadow: 0 0 15px rgba(210, 168, 255, 0.05); }
    
    .hdr { font-family: var(--hd); font-size: 10px; color: var(--ru); letter-spacing: 1px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .hdr::after { content: ''; flex: 1; border-bottom: 1px solid var(--bd); }
    
    .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed var(--gd); }
    .row .l { color: var(--ic); display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .row .r { font-weight: 700; font-family: var(--mono); font-size: 14px; }
    
    .tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px; }
    .tag.bloat { background: rgba(248, 81, 73, 0.15); color: var(--bl); }
    .tag.gov { background: rgba(88, 166, 255, 0.15); color: var(--fj); }
    
    .field-row { margin-bottom: 12px; }
    .field { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .lbl { display: flex; align-items: baseline; font-size: 13px; color: var(--sn); flex: 1; }
    .lbl span { color: var(--dm); margin-left: 8px; font-size: 11px; }
    
    .inp-wrap { display: flex; align-items: center; background: var(--in); border: 1px solid var(--bd); border-radius: 4px; flex: 0 0 160px; overflow: hidden; transition: border-color 0.2s; }
    .inp-wrap:focus-within { border-color: var(--ru); }
    .inp-wrap.hi { border-color: var(--pn); background: var(--pb); }
    
    .inp-wrap .pre { padding: 8px 0 8px 10px; color: var(--ic); font-family: var(--mono); font-size: 13px; user-select: none; }
    .inp-wrap input { flex: 1; border: none; background: none; color: var(--sn); padding: 8px 10px; font-size: 14px; font-family: var(--mono); outline: none; min-width: 0; text-align: right; }
    .inp-wrap .suf { padding: 8px 10px 8px 0; color: var(--ic); font-family: var(--mono); font-size: 13px; user-select: none; }
    
    .warn { font-size: 12px; color: var(--bl); margin-top: 4px; text-align: right; }
    
    .big { display: flex; justify-content: space-between; align-items: baseline; padding: 16px 0 4px; border-top: 2px solid var(--gd); margin-top: 8px; }
    .big .l { font-weight: 700; font-size: 14px; color: var(--ru); letter-spacing: 1px; }
    .big .r { font-family: var(--mono); font-size: 24px; color: var(--ru); font-weight: 700; }
    
    textarea { width: 100%; min-height: 80px; background: var(--in); color: var(--sn); padding: 12px; font: 13px var(--mono); resize: vertical; outline: none; border: 1px solid var(--bd); border-radius: 4px; line-height: 1.6; }
    textarea:focus { border-color: var(--ru); }
    textarea::placeholder, input::placeholder { color: var(--dm); }
    
    .pbtn { padding: 10px 16px; border: 1px solid var(--bd); border-radius: 4px; font: 12px var(--sans); font-weight: 600; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; }
    .pbtn:hover { filter: brightness(1.2); }
    
    .collapse-btn { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
    .tips p { margin: 0 0 10px; font-size: 13px; color: var(--ic); line-height: 1.6; }
    .tips p:last-child { margin: 0; }
    .tips b { color: var(--ru); margin-right: 6px; }
  </style>
</head>
