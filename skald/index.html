<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKALD</title>
  <link rel="stylesheet" href="../global-nav.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0e17;--sf:#111827;--in:#0d1321;--bd:#2a3a5c;--sn:#e6edf3;--ic:#94b8d4;
      --dm:#4a6480;--gd:#1c2a42;--ru:#d4a843;--pn:#5daa68;--pb:#5daa6815;--bl:#c44040;
      --fj:#2e5a8f;--hd:'Press Start 2P',monospace;--bd2:'Consolas','Courier New',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--sn);font-family:var(--bd2);font-size:13px;line-height:1.6}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    input[type=number]{-moz-appearance:textfield;appearance:textfield}
    ::selection{background:var(--ru);color:var(--bg)}
    .card{background:var(--sf);padding:14px;margin-bottom:14px;box-shadow:3px 0 0 0 var(--bd),-3px 0 0 0 var(--bd),0 3px 0 0 var(--bd),0 -3px 0 0 var(--bd)}
    .card.gold{box-shadow:3px 0 0 0 var(--ru),-3px 0 0 0 var(--ru),0 3px 0 0 var(--ru),0 -3px 0 0 var(--ru)}
    .hdr{font-family:var(--hd);font-size:9px;color:var(--ru);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .hdr::after{content:'';flex:1;border-bottom:1px solid var(--gd)}
    .row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px dashed var(--gd);font-size:13px}
    .row .l{color:var(--ic);display:flex;align-items:center;gap:6px}
    .row .r{font-weight:700;font-family:var(--bd2)}
    .tag{font-size:8px;font-family:var(--hd);padding:1px 5px;letter-spacing:1px}
    .tag.bloat{background:var(--ru);color:var(--bg)}.tag.gov{background:var(--fj);color:var(--sn)}
    .lbl{display:block;font-size:10px;color:var(--ic);margin-bottom:4px;letter-spacing:0.5px}
    .lbl span{color:var(--dm);margin-left:6px}
    .inp-wrap{display:flex;align-items:center;background:var(--in);box-shadow:2px 0 0 0 var(--bd),-2px 0 0 0 var(--bd),0 2px 0 0 var(--bd),0 -2px 0 0 var(--bd)}
    .inp-wrap.hi{box-shadow:2px 0 0 0 var(--pn),-2px 0 0 0 var(--pn),0 2px 0 0 var(--pn),0 -2px 0 0 var(--pn)}
    .inp-wrap .pre{padding:6px 0 6px 8px;color:var(--dm);font-size:12px;user-select:none}
    .inp-wrap input{flex:1;border:none;background:none;color:var(--sn);padding:6px 8px;font-size:14px;font-family:var(--bd2);outline:none;min-width:0}
    .inp-wrap .suf{padding:6px 8px 6px 0;color:var(--dm);font-size:11px;user-select:none}
    .field{margin-bottom:10px}
    .warn{font-size:10px;color:var(--ru);margin-top:3px}
    .big{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0 0;border-top:3px double var(--ru)}
    .big .l{font-family:var(--hd);font-size:10px;color:var(--ru)}
    .big .r{font-family:var(--hd);font-size:18px;color:var(--ru);text-shadow:2px 2px 0 #000}
    textarea{width:100%;min-height:70px;background:var(--in);color:var(--sn);padding:8px;font:12px var(--bd2);resize:vertical;outline:none;border:none;line-height:1.6;box-shadow:2px 0 0 0 var(--bd),-2px 0 0 0 var(--bd),0 2px 0 0 var(--bd),0 -2px 0 0 var(--bd)}
    textarea::placeholder,input::placeholder{color:var(--dm)}
    .pbtn{padding:8px 14px;border:none;font:11px var(--hd);cursor:pointer;letter-spacing:1px;box-shadow:2px 0 0 0 currentColor,-2px 0 0 0 currentColor,0 2px 0 0 currentColor,0 -2px 0 0 currentColor}
    .collapse-btn{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;padding:2px 0}
    .tips p{margin:0 0 8px;font-size:12px;color:var(--ic);line-height:1.8}
    .tips p:last-child{margin:0}
    .tips b{color:var(--ru)}
  </style>
</head>
<body>
  <div id="global-nav"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="../global-nav.js"></script>

  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;

    const fmt = (n) => {
      if (n==null||isNaN(n)) return "";
      return `$${Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
    };
    const pct = (n) => (n*100).toFixed(1)+"%";

    const TAX={AL:.02,AK:0,AZ:.056,AR:.065,CA:.0725,CO:.029,CT:.0635,DE:0,DC:.06,FL:.06,GA:.04,HI:.04,ID:.06,IL:.0625,IN:.07,IA:.06,KS:.065,KY:.06,LA:.0445,ME:.055,MD:.06,MA:.0625,MI:.06,MN:.06875,MS:.05,MO:.04225,MT:0,NE:.055,NV:.0685,NH:0,NJ:.06625,NM:.05125,NY:.04,NC:.03,ND:.05,OH:.0575,OK:.045,OR:0,PA:.06,RI:.07,SC:.06,SD:.042,TN:.07,TX:.0625,UT:.0485,VT:.06,VA:.0415,WA:.065,WV:.06,WI:.05,WY:.04};
    const NAMES={AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",CO:"Colorado",CT:"Connecticut",DE:"Delaware",DC:"DC",FL:"Florida",GA:"Georgia",HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",MS:"Mississippi",MO:"Missouri",MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",NJ:"New Jersey",NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming"};
    const TC=new Set(Object.keys(TAX).filter(s=>!["AK","DE","ME","MT","NH","OR","VT"].includes(s)));
    const ZR=[[5,9,"NY"],[10,27,"MA"],[28,29,"RI"],[30,38,"NH"],[39,49,"ME"],[50,59,"VT"],[60,69,"CT"],[70,89,"NJ"],[100,149,"NY"],[150,196,"PA"],[197,199,"DE"],[200,205,"DC"],[206,219,"MD"],[220,246,"VA"],[247,268,"WV"],[270,289,"NC"],[290,299,"SC"],[300,319,"GA"],[320,349,"FL"],[350,369,"AL"],[370,385,"TN"],[386,397,"MS"],[398,399,"GA"],[400,427,"KY"],[430,458,"OH"],[460,479,"IN"],[480,499,"MI"],[500,528,"IA"],[530,549,"WI"],[550,567,"MN"],[570,577,"SD"],[580,588,"ND"],[590,599,"MT"],[600,629,"IL"],[630,658,"MO"],[660,679,"KS"],[680,693,"NE"],[700,714,"LA"],[716,729,"AR"],[730,749,"OK"],[750,799,"TX"],[800,816,"CO"],[820,831,"WY"],[832,838,"ID"],[840,847,"UT"],[850,865,"AZ"],[870,884,"NM"],[885,885,"TX"],[889,898,"NV"],[900,961,"CA"],[967,968,"HI"],[970,979,"OR"],[980,994,"WA"],[995,999,"AK"]];
    const z2s=(z)=>{if(!z||z.length<3)return null;const p=parseInt(z.substring(0,3));if(isNaN(p))return null;for(const[a,b,s]of ZR)if(p>=a&&p<=b)return s;return null;};

    // AI import
    async function aiExtract(text,hints,key){
      const ctx=hints.make?`Vehicle: ${hints.condition||""} ${hints.make||""} ${hints.model||""}\n`:"";
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
          system:`Extract vehicle listing data. ONLY JSON:\n{"year":number|null,"make":"str"|null,"model":"str"|null,"trim":"str"|null,"msrp":number|null,"dealer_price":number|null,"dealer_discount":number|null,"rebates":[{"name":"str","amount":number}],"doc_fee":number|null,"freight":number|null,"bloat_addons":[{"name":"str","amount":number}]}\ndoc/admin=doc_fee. freight/destination=freight. nitrogen/paint/fabric/tint/market adj/accessories=bloat_addons. Skip tax/tag/title. No markdown.`,
          messages:[{role:"user",content:`${ctx}Extract:\n\n${text.slice(0,4000)}`}]})});
      const d=await r.json();
      return JSON.parse((d.content?.find(b=>b.type==="text")?.text||"").replace(/```json|```/g,"").trim());
    }
    function urlHints(url){const h={};try{const u=new URL(url),p=u.pathname.toLowerCase().split("/").filter(Boolean);if(u.hostname.includes("autotrader")){h.source="Autotrader";const i=p.findIndex(x=>x.includes("-cars"));if(i>=0){h.make=p[i+2];h.model=p[i+3];h.condition=p[i].includes("new")?"New":"Used";}}else if(u.hostname.includes("cars.com"))h.source="Cars.com";else if(u.hostname.includes("cargurus"))h.source="CarGurus";else if(u.hostname.includes("truecar")){h.source="TrueCar";const t=p.filter(x=>!["new","used","prices","overview"].includes(x));h.make=t[0];h.model=t[1];}else h.source=u.hostname.replace("www.","");}catch{}return h;}

    // Berserker (compact 16x16)
    function Logo(){
      const P="var(--ru)",S="var(--sn)",B="var(--bd)",R="var(--bl)",G="var(--dm)",N="var(--pn)",_=null,Z=3;
      const g=[[_,P,_,_,_,_,_,_,_,_,_,_,_,_,P,_],[P,B,P,_,_,P,P,P,P,P,P,_,_,P,B,P],[B,_,B,P,P,P,P,P,P,P,P,P,P,B,_,B],[_,_,_,B,P,P,P,P,P,P,P,P,B,_,_,_],[_,_,B,S,S,B,P,P,P,P,B,S,S,B,_,_],[_,_,B,B,S,B,B,P,P,B,B,S,B,B,_,_],[_,_,_,B,S,S,S,S,S,S,S,S,B,_,_,_],[_,_,B,P,P,S,R,R,R,R,S,P,P,B,_,_],[_,P,B,G,G,P,B,B,B,B,P,G,G,B,R,_],[P,P,B,G,G,G,B,G,G,B,G,G,G,B,R,N],[_,_,B,G,G,G,B,G,G,B,G,G,G,B,R,_],[_,_,_,B,P,P,P,P,P,P,P,P,B,_,_,_],[_,_,_,B,G,G,B,B,B,B,G,G,B,_,_,_],[_,_,B,B,B,B,_,_,_,_,B,B,B,B,_,_]];
      return <svg width={16*Z} height={g.length*Z} viewBox={`0 0 ${16*Z} ${g.length*Z}`} style={{imageRendering:"pixelated"}}>{g.map((r,y)=>r.map((c,x)=>c?<rect key={`${x}${y}`} x={x*Z} y={y*Z} width={Z} height={Z} fill={c}/>:null))}</svg>;
    }

    // Components
    function F({label,value,onChange,pre="$",suf,hint,warn,hi:h}){
      return <div className="field"><label className="lbl">{label}{hint&&<span>{hint}</span>}</label><div className={`inp-wrap${h?" hi":""}`}>{pre&&<span className="pre">{pre}</span>}<input type="number" value={value} onChange={e=>onChange(e.target.value===""?"":Number(e.target.value))}/>{suf&&<span className="suf">{suf}</span>}</div>{warn&&<div className="warn">⚠ {warn}</div>}</div>;
    }
    function R({l,v,c,b,tag}){
      return <div className="row"><span className="l" style={{color:c||undefined}}>{l}{tag&&<span className={`tag ${tag.toLowerCase()}`}>{tag}</span>}</span><span className="r" style={{color:c||undefined}}>{typeof v==="string"?v:fmt(v)}</span></div>;
    }

    // Import
    function Import({onApply}){
      const[open,setOpen]=useState(false);
      const[txt,setTxt]=useState("");
      const[st,setSt]=useState("idle");
      const[pv,setPv]=useState(null);
      const[hints,setHints]=useState({});
      const[key,setKey]=useState(()=>{try{return localStorage.getItem("skald_key")||"";}catch{return"";}});
      const saveKey=k=>{setKey(k);try{localStorage.setItem("skald_key",k);}catch{}};

      const go=useCallback(async()=>{
        if(txt.trim().length<30||!key)return;
        setSt("loading");
        try{const r=await aiExtract(txt,hints,key);setPv(r);setSt("preview");}
        catch{setSt("error");}
      },[txt,hints,key]);

      const handleTxt=t=>{setTxt(t);if(!t.trim()){setSt("idle");return;}
        const m=t.trim().match(/^https?:\/\/\S+$/);if(m){setHints(urlHints(m[0]));setSt("idle");}};

      const apply=()=>{if(!pv)return;
        onApply({msrp:pv.msrp,discountPct:pv.msrp&&pv.dealer_discount?Math.round(pv.dealer_discount/pv.msrp*100):null,
          r1:pv.rebates?.[0]?.amount,r2:pv.rebates?.[1]?.amount,r3:pv.rebates?.[2]?.amount,
          doc:pv.doc_fee,freight:pv.freight,
          bloat:(pv.bloat_addons?.reduce((s,f)=>s+f.amount,0))||null,
          name:[pv.year,pv.make,pv.model,pv.trim].filter(Boolean).join(" ")});
        setOpen(false);setSt("idle");};

      return <div className="card" style={{boxShadow:"3px 0 0 0 var(--fj),-3px 0 0 0 var(--fj),0 3px 0 0 var(--fj),0 -3px 0 0 var(--fj)"}}>
        <div className="collapse-btn" onClick={()=>setOpen(!open)}>
          <span className="hdr" style={{marginBottom:0}}>ᛊ IMPORT</span>
          <span style={{color:"var(--dm)",fontSize:14,transform:open?"rotate(180deg)":"",transition:"transform .2s",display:"inline-block"}}>▼</span>
        </div>
        {open&&<div style={{marginTop:10}}>
          <div className="field"><label className="lbl">API KEY <span style={{color:"var(--bl)"}}>(stored locally)</span></label>
            <div className="inp-wrap"><input type="password" value={key} onChange={e=>saveKey(e.target.value)} placeholder="sk-ant-..." style={{fontSize:11}}/></div></div>
          {hints.source&&<div style={{fontSize:11,color:"var(--pn)",marginBottom:8,padding:"5px 8px",background:"var(--pb)"}}>✓ {hints.source}{hints.make?` · ${hints.make} ${hints.model||""}`:""}</div>}
          <textarea value={txt} onChange={e=>handleTxt(e.target.value)} placeholder="Paste listing URL, then pricing text..."/>
          {st==="loading"&&<div style={{fontSize:11,color:"var(--ru)",marginTop:6}}>◆ Reading the runes...</div>}
          {st==="error"&&<div style={{fontSize:11,color:"var(--bl)",marginTop:6}}>Could not parse. Check key or paste more.</div>}
          {st==="preview"&&pv&&<div style={{marginTop:10}}>
            <div style={{background:"var(--in)",padding:10,marginBottom:8}}>
              {pv.year&&pv.make&&<div style={{fontFamily:"var(--hd)",fontSize:10,color:"var(--sn)",marginBottom:6}}>{[pv.year,pv.make,pv.model,pv.trim].filter(Boolean).join(" ")}</div>}
              {pv.msrp&&<R l="MSRP" v={pv.msrp} b/>}{pv.dealer_discount&&<R l="Discount" v={pv.dealer_discount} c="var(--pn)"/>}
              {pv.rebates?.map((r,i)=><R key={i} l={r.name||`Rebate`} v={r.amount} c="var(--pn)"/>)}
              {pv.doc_fee&&<R l="Doc Fee" v={pv.doc_fee}/>}{pv.freight&&<R l="Freight" v={pv.freight} tag="BLOAT" c="var(--ru)"/>}
              {pv.bloat_addons?.map((b,i)=><R key={i} l={b.name} v={b.amount} tag="BLOAT" c="var(--ru)"/>)}
            </div>
            <div style={{display:"flex",gap:8}}><button className="pbtn" onClick={apply} style={{background:"var(--pn)",color:"var(--bg)"}}>APPLY</button><button className="pbtn" onClick={()=>{setSt("idle");setPv(null);setTxt("");}} style={{background:"transparent",color:"var(--dm)"}}>CLEAR</button></div>
          </div>}
          {st==="idle"&&txt.trim().length>30&&key&&<button className="pbtn" onClick={go} style={{background:"var(--ru)",color:"var(--bg)",marginTop:8}}>EXTRACT</button>}
          {st==="idle"&&txt.trim().length>30&&!key&&<div style={{fontSize:10,color:"var(--dm)",marginTop:6}}>Enter API key to enable extraction</div>}
        </div>}
      </div>;
    }

    // Main
    function App(){
      const[msrp,setMsrp]=useState(55000);const[disc,setDisc]=useState(10);
      const[r1,setR1]=useState(0);const[r2,setR2]=useState(0);const[r3,setR3]=useState(0);
      const[trOff,setTrOff]=useState(0);const[trPay,setTrPay]=useState(0);const[down,setDown]=useState(0);
      const[zip,setZip]=useState("17013");const[tag,setTag]=useState(558);
      const[doc,setDoc]=useState(500);const[frt,setFrt]=useState(0);const[adn,setAdn]=useState(0);
      const[apr,setApr]=useState(5.5);const[trm,setTrm]=useState(84);const[d2f,setD2f]=useState(30);
      const[vName,setVName]=useState("");const[hiSet,setHi]=useState(new Set());
      const st=useMemo(()=>z2s(zip),[zip]);
      const[tipsOpen,setTipsOpen]=useState(false);

      const imp=useCallback(d=>{
        const t=new Set();
        if(d.msrp){setMsrp(d.msrp);t.add("msrp");}if(d.discountPct){setDisc(d.discountPct);t.add("disc");}
        if(d.r1){setR1(d.r1);t.add("r1");}if(d.r2){setR2(d.r2);t.add("r2");}if(d.r3){setR3(d.r3);t.add("r3");}
        if(d.doc!=null){setDoc(d.doc);t.add("doc");}if(d.freight){setFrt(d.freight);t.add("frt");}
        if(d.bloat){setAdn(d.bloat);t.add("adn");}if(d.name)setVName(d.name);
        setHi(t);setTimeout(()=>setHi(new Set()),3000);
      },[]);

      const c=useMemo(()=>{
        const s=st||"PA",dsc=msrp*(disc/100),dp=msrp-dsc,reb=(r1||0)+(r2||0)+(r3||0),fp=dp-reb;
        const te=(trOff||0)-(trPay||0),tc=TC.has(s)?Math.max(trOff||0,0):0;
        const txb=Math.max(fp-tc,0),tr=TAX[s]||0,tx=txb*tr;
        const bl=(frt||0)+(adn||0),gv=tag||0;
        const otd=fp-te+tx+(doc||0)+bl+gv-(down||0);
        const mo=(apr/100)/12;let mp=0,ti=0,tl=0;
        if(mo>0&&trm>0&&otd>0){mp=otd*(mo*Math.pow(1+mo,trm))/(Math.pow(1+mo,trm)-1);tl=mp*trm;ti=tl-otd;}
        else if(trm>0&&otd>0){mp=otd/trm;tl=otd;}
        const dr=(apr/100)/365;
        return{s,dsc,dp,reb,fp,te,tc,txb,tr,tx,doc:doc||0,bl,gv,otd,mp,ti,tl,dr,ii:otd*dr*(d2f||30),pct:msrp>0?((msrp-fp)/msrp)*100:0,dn:down||0};
      },[msrp,disc,r1,r2,r3,trOff,trPay,down,st,tag,doc,frt,adn,apr,trm,d2f]);

      const h=f=>hiSet.has(f);

      return <div style={{maxWidth:480,margin:"0 auto",padding:"16px 10px"}}>
        {/* Header */}
        <div style={{textAlign:"center",marginBottom:20,padding:"16px 0"}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:10}}><Logo/></div>
          <h1 style={{fontFamily:"var(--hd)",fontSize:22,color:"var(--ru)",letterSpacing:8,textShadow:"2px 2px 0 #000",margin:0}}>SKALD</h1>
          <div style={{fontSize:9,fontFamily:"var(--hd)",color:"var(--ic)",marginTop:8,letterSpacing:1}}>10% OFF · STACK REBATES · SLAY BLOAT</div>
        </div>

        <Import onApply={imp}/>
        {vName&&<div style={{marginBottom:14,padding:"8px 12px",background:"var(--pb)",fontSize:12,color:"var(--pn)",display:"flex",justifyContent:"space-between"}}>
          <span>⚔ {vName}</span><span style={{color:"var(--dm)",fontSize:10}}>imported</span></div>}

        {/* Price + Rebates */}
        <div className="card">
          <div className="hdr">ᚹ PRICE</div>
          <F label="MSRP" value={msrp} onChange={setMsrp} hi={h("msrp")}/>
          <F label="Discount" value={disc} onChange={setDisc} pre="" suf="% off" hint={`= ${fmt(c.dsc)}`} hi={h("disc")}/>
          <R l="Dealer Price" v={c.dp} b/>
          <div style={{margin:"8px 0",borderTop:"1px dashed var(--gd)"}}/>
          <F label="Rebate 1" value={r1} onChange={setR1} hint="national" hi={h("r1")}/>
          <F label="Rebate 2" value={r2} onChange={setR2} hint="inventory" hi={h("r2")}/>
          <F label="Rebate 3" value={r3} onChange={setR3} hint="promo" hi={h("r3")}/>
          {c.reb>0&&<R l="Total Rebates" v={-c.reb} c="var(--pn)"/>}
          <div className="big"><span className="l">FINAL</span><span className="r">{fmt(c.fp)}</span></div>
          {c.pct>0&&<div style={{fontSize:10,color:"var(--pn)",textAlign:"right",marginTop:2}}>{c.pct.toFixed(1)}% off MSRP</div>}
        </div>

        {/* Trade + Down */}
        <div className="card">
          <div className="hdr">ᛏ TRADE & EQUITY</div>
          <F label="Trade In Offer" value={trOff} onChange={setTrOff}/>
          <F label="Loan Payoff" value={trPay} onChange={setTrPay}/>
          <R l="Net Equity" v={c.te} b c={c.te<0?"var(--bl)":"var(--pn)"}/>
          {c.te<0&&<div style={{fontSize:10,color:"var(--bl)",marginTop:3}}>⚠ {fmt(Math.abs(c.te))} negative equity rolled in</div>}
          <div style={{marginTop:6}}/>
          <F label="Cash Down" value={down} onChange={setDown}/>
        </div>

        {/* Tax + Fees */}
        <div className="card">
          <div className="hdr">ᚠ TAX & FEES</div>
          <div className="field">
            <label className="lbl">ZIP CODE</label>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <div className="inp-wrap" style={{flex:"0 0 110px"}}><input type="text" inputMode="numeric" maxLength={5} value={zip} placeholder="17013"
                onChange={e=>setZip(e.target.value.replace(/\D/g,"").slice(0,5))} style={{textAlign:"center",letterSpacing:3,fontSize:16}}/></div>
              <div>{st?<><div style={{fontSize:12,color:"var(--pn)"}}>✓ {NAMES[st]}</div><div style={{fontSize:11,color:"var(--ru)"}}>{(TAX[st]*100).toFixed(2)}%{TC.has(st)?<span style={{color:"var(--pn)",marginLeft:6}}>+trade credit</span>:null}</div></>
                :<span style={{fontSize:10,color:"var(--dm)"}}>{zip.length>0&&zip.length<3?"...":zip.length>=3?"unknown":"enter zip"}</span>}</div>
            </div>
          </div>
          {st&&TC.has(st)&&trOff>0&&<div style={{fontSize:10,color:"var(--pn)",marginBottom:6}}>✓ Taxed on {fmt(c.txb)} (trade credit applied)</div>}
          <R l={`Tax (${pct(c.tr)})`} v={c.tx} tag="GOV"/>
          <F label="Tag / Title / Reg" value={tag} onChange={setTag} hint="gov"/>
          <div style={{margin:"8px 0",borderTop:"1px dashed var(--gd)"}}/>
          <div className="hdr">⚠ DEALER FEES</div>
          <F label="Doc / Processing" value={doc} onChange={setDoc} hint="legit" hi={h("doc")}/>
          <F label="Freight" value={frt} onChange={setFrt} warn={frt>0?"In MSRP already. Push back.":""} hi={h("frt")}/>
          <F label="Other Add-On" value={adn} onChange={setAdn} warn={adn>0?"Nitrogen? Paint coat? Say no.":""} hi={h("adn")}/>
          {c.bl>0&&<R l="Dealer Bloat" v={c.bl} tag="BLOAT" c="var(--ru)" b/>}
        </div>

        {/* OTD */}
        <div className="card gold">
          <div className="hdr">ᛟ OUT THE DOOR</div>
          <R l="Vehicle" v={c.fp}/><R l="Trade Equity" v={-c.te} c={c.te>0?"var(--pn)":c.te<0?"var(--bl)":"var(--dm)"}/>
          <R l="Tax" v={c.tx}/><R l="Gov Fees" v={c.gv}/><R l="Doc Fee" v={c.doc}/>
          {c.bl>0&&<R l="Bloat" v={c.bl} tag="BLOAT" c="var(--ru)"/>}
          <R l="Cash Down" v={-c.dn} c={c.dn>0?"var(--pn)":"var(--dm)"}/>
          <div className="big"><span className="l">OTD</span><span className="r">{fmt(c.otd)}</span></div>
        </div>

        {/* Finance */}
        <div className="card">
          <div className="hdr">ᚷ FINANCE</div>
          <F label="APR" value={apr} onChange={setApr} pre="" suf="%"/>
          <F label="Term" value={trm} onChange={setTrm} pre="" suf="mo"/>
          <F label="Days to 1st Pmt" value={d2f} onChange={setD2f} pre="" suf="days"/>
          <R l="Total Interest" v={c.ti} c="var(--bl)"/><R l="Total Cost" v={c.tl} b/>
          <R l="Daily Rate" v={pct(c.dr)}/><R l={`Accrued (${d2f||30}d)`} v={c.ii} c="var(--ru)"/>
          <div className="big"><span className="l">MONTHLY</span><span className="r" style={{fontSize:22}}>{fmt(c.mp)}</span></div>
        </div>

        {/* Tips */}
        <div className="card" style={{boxShadow:"3px 0 0 0 var(--fj),-3px 0 0 0 var(--fj),0 3px 0 0 var(--fj),0 -3px 0 0 var(--fj)"}}>
          <div className="collapse-btn" onClick={()=>setTipsOpen(!tipsOpen)}>
            <span className="hdr" style={{marginBottom:0}}>ᛉ TIPS</span>
            <span style={{color:"var(--dm)",fontSize:14,transform:tipsOpen?"rotate(180deg)":"",transition:"transform .2s",display:"inline-block"}}>▼</span>
          </div>
          {tipsOpen&&<div className="tips" style={{marginTop:10}}>
            <p><b>►</b> Walk in with your number. OTD and monthly. You're confirming, not negotiating.</p>
            <p><b>►</b> 10% off MSRP is the floor. Invoice is 6 to 8% under. Holdback adds 2 to 3%.</p>
            <p><b>►</b> Stack every rebate. National + inventory + conquest + trade assist. Ask. Some aren't posted.</p>
            <p><b>►</b> Refuse add-ons. Freight is in MSRP. Nitrogen, paint coat, LoJack · all margin.</p>
            <p><b>►</b> Negotiate price first, APR second. Never on monthly. That's where margin hides.</p>
            <p><b>►</b> Get pre-approved at a credit union. Make the dealer beat it. No credit pull without a locked price.</p>
          </div>}
        </div>

        <div style={{textAlign:"center",fontSize:8,fontFamily:"var(--hd)",color:"var(--dm)",padding:"20px 0",letterSpacing:1}}>
          SKALD · Not financial advice
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
